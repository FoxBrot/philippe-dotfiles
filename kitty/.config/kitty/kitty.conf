# ============================================================
# kitty.conf — terminal configuration
# by Philippe Pereira (FoxBrot) (2026)
# Theme: frosted charcoal + cream accents (matches Waybar / Rofi)
# ============================================================

# ---- Font ----
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
modify_font      cell_height 118%

# ---- Window ----
background_opacity         0.80
window_padding_width       16
hide_window_decorations    yes
confirm_os_window_close    0
enable_audio_bell          no
remember_window_size       no
initial_window_width       1000
initial_window_height      600

# ---- Cursor ----
cursor_shape          beam
cursor_beam_thickness 1.8
cursor_blink_interval 0.6
cursor_trail          3
cursor_trail_decay    0.1 0.3

# ---- Scrollback / mouse ----
scrollback_lines 10000
mouse_hide_wait  2.0
url_style        curly
detect_urls      yes

# ---- Colors: frosted dark blue + cream ----
foreground           #ebe3d3
background           #1e1e2e
selection_foreground #1e1e2e
selection_background #cfc2a6

cursor            #cfc2a6
cursor_text_color #1e1e2e

url_color #d9822e

# ---- Window splits ----
active_border_color   #cfc2a6
inactive_border_color #45455a
window_border_width   1.5pt
inactive_text_alpha   0.7
enabled_layouts       splits,stack

# ---- Tab bar ----
tab_bar_edge            bottom
tab_bar_style           custom
tab_bar_margin_width    8.0
tab_bar_margin_height   6.0 0.0
tab_bar_min_tabs        2
active_tab_foreground   #1e1e2e
active_tab_background   #cfc2a6
active_tab_font_style   bold
inactive_tab_foreground #8a8377
inactive_tab_background #2a2a3c

# ---- The 16 terminal colors ----
# black
color0  #2a2a3c
color8  #55556a
# red
color1  #c65b4e
color9  #e07b6d
# green
color2  #95b088
color10 #b0c9a2
# yellow
color3  #d9a962
color11 #eac588
# blue
color4  #7a95b8
color12 #9cb4d4
# magenta
color5  #b58ea8
color13 #d0a9c4
# cyan
color6  #86a8a3
color14 #a6c6c0
# white
color7  #cfc2a6
color15 #ebe3d3

# ---- Keybindings ----
map ctrl+shift+c      copy_to_clipboard
map ctrl+shift+v      paste_from_clipboard
map ctrl+shift+equal  change_font_size all +1.0
map ctrl+shift+minus  change_font_size all -1.0
map ctrl+shift+0      change_font_size all 0

# splits (like a tiling terminal inside kitty)
map ctrl+shift+enter  launch --location=vsplit --cwd=current
map ctrl+shift+d      launch --location=hsplit --cwd=current
map ctrl+shift+left   neighboring_window left
map ctrl+shift+right  neighboring_window right
map ctrl+shift+up     neighboring_window up
map ctrl+shift+down   neighboring_window down
map ctrl+shift+z      toggle_layout stack

# tabs
map ctrl+shift+t      new_tab_with_cwd
map ctrl+shift+w      close_tab
map ctrl+shift+.      next_tab
map ctrl+shift+,      previous_tab
